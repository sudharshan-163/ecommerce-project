<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Product | Sudhas Bakery</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins,sans-serif;background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),url('/images/image4.jpg') center/cover fixed}
.navbar{background:rgba(255,255,255,.92)!important;backdrop-filter:blur(10px)}
.card{max-width:760px;margin:40px auto;border:none;border-radius:20px;box-shadow:0 15px 40px rgba(0,0,0,.25)}
.btn-gold{background:#d4af37;color:#fff}.btn-gold:hover{background:#b58d17;color:#fff}
#imgPreview{width:120px;height:120px;object-fit:cover;border-radius:12px;border:2px solid #eee}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand fw-bold text-warning" th:href="@{/admin}">
<img th:src="@{/images/logo.png}" src="../static/images/logo.png" width="60"> Sudhas Bakery Admin
</a>
<div class="ms-auto">
<a class="nav-link" th:href="@{/admin}"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>
</div>
</nav>

<div class="container">
<div class="card">
<div class="card-body p-4 p-md-5">
<h2 class="text-center text-warning mb-4">Add New Product</h2>

<form th:action="@{/admin/products/add}" method="post" th:object="${productDTO}" enctype="multipart/form-data">

<input type="hidden" th:field="*{id}">

<div class="row g-3">
<div class="col-md-6">
<label class="form-label">Product Name</label>
<input class="form-control" th:field="*{name}" required placeholder="Enter product name">
</div>

<div class="col-md-6">
<label class="form-label">Category</label>
<select class="form-select" th:field="*{categoryId}">
<option th:each="category:${categories}" th:value="${category.id}" th:text="${category.name}"></option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Price</label>
<input class="form-control" type="number" th:field="*{price}" required>
</div>

<div class="col-md-6">
<label class="form-label">Weight (g)</label>
<input class="form-control" type="number" th:field="*{weight}" required>
</div>

<div class="col-12">
<label class="form-label">Description</label>
<textarea class="form-control" rows="4" th:field="*{description}"></textarea>
</div>

<div class="col-md-8">
<label class="form-label">Product Image</label>
<input class="form-control" type="file" id="productImage" name="productImage" accept="image/png,image/jpeg">
<input type="hidden" name="imgName" th:value="${productDTO.imageName}">
</div>

<div class="col-md-4 text-center">
<img id="imgPreview" th:src="@{${'/productImages/' + productDTO.imageName}}" src="#" alt="Preview">
</div>

<div class="col-12 text-center mt-3">
<button class="btn btn-gold btn-lg px-5" type="submit"><i class="bi bi-plus-circle"></i> Save Product</button>
</div>

</div>
</form>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('productImage').addEventListener('change',function(e){
const f=e.target.files[0];
if(f){
const r=new FileReader();
r.onload=x=>document.getElementById('imgPreview').src=x.target.result;
r.readAsDataURL(f);
}
});
</script>
</body>
</html>
