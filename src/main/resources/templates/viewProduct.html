<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity3">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product Details | Sudhas Bakery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins,sans-serif;background:#fff8f0}
.navbar{background:#fff!important;box-shadow:0 5px 18px rgba(0,0,0,.08)}
.product-card{background:#fff;border:none;border-radius:22px;box-shadow:0 15px 35px rgba(0,0,0,.1)}
.product-img{height:420px;object-fit:cover;border-radius:18px}
.price{font-size:2rem;color:#d4af37;font-weight:700}
.badge-custom{background:#fff3cd;color:#8a6500}
.btn-gold{background:#d4af37;color:#fff;border:none}
.btn-gold:hover{background:#b58d17;color:#fff}
.feature{background:#fff;border-radius:15px;padding:18px;box-shadow:0 8px 18px rgba(0,0,0,.08)}
footer{background:#1f1f1f;color:#fff}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg sticky-top">
<div class="container">
<a class="navbar-brand fw-bold text-warning" th:href="@{/}">
<img th:src="@{/images/logo.png}" src="../static/images/logo.png" width="60"> Sudhas Bakery
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
<li class="nav-item"><a class="nav-link" th:href="@{/shop}">Shop</a></li>
<li class="nav-item"><a class="nav-link" sec:authorize="isAnonymous()" th:href="@{/admin}">Admin</a></li>
</ul>
</div>
</div>
</nav>

<div class="container py-5">

<div class="card product-card p-4">

<div class="row g-5 align-items-center">

<div class="col-lg-5 text-center">
<img class="img-fluid product-img"
th:src="@{${'/productImages/' + product.imageName}}"
th:alt="${product.name}">
</div>

<div class="col-lg-7">

<span class="badge badge-custom mb-3">Freshly Baked</span>

<h1 class="fw-bold mb-2" th:text="${product.name}"></h1>

<p class="text-muted mb-3">
Category:
<strong th:text="${product.category.name}"></strong>
</p>

<div class="price mb-3">
₹ <span th:text="${product.price}"></span>
</div>

<p class="mb-3">
<strong>Weight:</strong>
<span th:text="${product.weight}"></span> grams
</p>

<p class="text-secondary" th:text="${product.description}"></p>

<div class="row g-3 my-4">
<div class="col-md-4">
<div class="feature text-center">
<i class="bi bi-award-fill text-warning fs-2"></i>
<p class="mb-0 mt-2">Premium Quality</p>
</div>
</div>

<div class="col-md-4">
<div class="feature text-center">
<i class="bi bi-truck text-warning fs-2"></i>
<p class="mb-0 mt-2">Fast Delivery</p>
</div>
</div>

<div class="col-md-4">
<div class="feature text-center">
<i class="bi bi-heart-fill text-warning fs-2"></i>
<p class="mb-0 mt-2">Made with Love</p>
</div>
</div>
</div>

<a th:href="@{/userform}" class="btn btn-gold btn-lg px-5">
<i class="bi bi-bag-check-fill"></i> Buy Product
</a>

</div>

</div>

</div>

</div>

<footer class="py-4 mt-5 text-center">
<div class="container">
<h5>Sudhas Bakery</h5>
<p class="mb-0">Freshly Baked Happiness Every Day</p>
</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
