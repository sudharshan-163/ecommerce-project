<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Category | Sudhas Bakery Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins,sans-serif;
background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),url('/images/image5.jpg') center/cover fixed;
min-height:100vh;
}
.navbar{
background:rgba(255,255,255,.92)!important;
backdrop-filter:blur(10px);
box-shadow:0 5px 20px rgba(0,0,0,.08);
}
.form-card{
max-width:500px;
margin:60px auto;
background:rgba(255,255,255,.95);
border:none;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}
.btn-gold{
background:#d4af37;
color:#fff;
border:none;
}
.btn-gold:hover{
background:#b58d17;
color:#fff;
}
.form-control{
border-radius:12px;
padding:12px;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand fw-bold text-warning" th:href="@{/admin}">
<img th:src="@{/images/logo.png}" src="../static/images/logo.png" width="60"> Sudhas Bakery Admin
</a>

<div class="ms-auto">
<a class="nav-link" th:href="@{/admin}">
<i class="bi bi-box-arrow-right"></i> Logout
</a>
</div>
</div>
</nav>

<div class="container">

<div class="card form-card">
<div class="card-body p-5">

<div class="text-center mb-4">
<i class="bi bi-tags-fill display-4 text-warning"></i>
<h2 class="text-warning fw-bold">Add Category</h2>
<p class="text-muted">Create a new bakery category</p>
</div>

<form th:action="@{/admin/categories/add}" method="post" th:object="${category}">

<input type="hidden" th:field="*{id}">

<div class="mb-4">
<label class="form-label fw-semibold">Category Name</label>
<input
type="text"
class="form-control"
th:field="*{name}"
required
placeholder="Enter category name">
</div>

<div class="d-grid">
<button class="btn btn-gold btn-lg" type="submit">
<i class="bi bi-plus-circle-fill"></i> Save Category
</button>
</div>

</form>

</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
