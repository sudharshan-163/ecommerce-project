<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sudhas Bakery | Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins,sans-serif;
background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),url('images/image5.jpg') center/cover no-repeat;
min-height:100vh;
display:flex;
flex-direction:column;
}
.navbar{
background:rgba(255,255,255,.92)!important;
backdrop-filter:blur(10px);
box-shadow:0 5px 20px rgba(0,0,0,.08);
}
.register-wrapper{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:40px 15px;
}
.register-card{
width:100%;
max-width:450px;
background:rgba(255,255,255,.94);
border-radius:20px;
padding:35px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}
.brand{color:#c79b06;font-weight:700}
.btn-gold{background:#d4af37;color:#fff;border:none}
.btn-gold:hover{background:#b58d17;color:#fff}
.form-control{border-radius:12px;padding:12px}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand fw-bold text-warning" th:href="@{/}">
<img th:src="@{/images/logo.png}" src="../static/images/logo.png" width="60"> Sudhas Bakery
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
<li class="nav-item"><a class="nav-link" th:href="@{/shop}">Shop</a></li>
</ul>
</div>
</div>
</nav>

<div class="register-wrapper">
<div class="register-card">

<div class="text-center mb-4">
<i class="bi bi-person-plus-fill display-4 text-warning"></i>
<h2 class="brand">Create Account</h2>
<p class="text-muted">Join Sudhas Bakery today</p>
</div>

<form th:action="@{/register}" method="post">

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" required minlength="6"
name="email" placeholder="Enter your email">
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" class="form-control"
required
name="password"
placeholder="Create a password">
</div>

<button class="btn btn-gold w-100 py-2" type="submit">
<i class="bi bi-person-check-fill"></i> Register
</button>

<div class="text-center mt-4">
<span class="text-muted">Already have an account?</span>
<a class="fw-bold text-warning" th:href="@{/login}">
 Login here
</a>
</div>

</form>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
