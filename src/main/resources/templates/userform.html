<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customer Details | Sudhas Bakery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:Poppins,sans-serif;
background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),url('images/image3.jpg') center/cover fixed;
min-height:100vh;
}
.form-card{
max-width:550px;
margin:50px auto;
background:rgba(255,255,255,.95);
border:none;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}
.btn-gold{
background:#d4af37;
color:#fff;
border:none;
}
.btn-gold:hover{
background:#b58d17;
color:#fff;
}
.form-control{
border-radius:12px;
padding:12px;
}
</style>

</head>
<body>

<div class="container">

<div class="card form-card">

<div class="card-body p-5">

<div class="text-center mb-4">
<i class="bi bi-person-vcard-fill display-3 text-warning"></i>
<h2 class="fw-bold text-warning">Customer Information</h2>
<p class="text-muted">Please fill in your delivery details</p>
</div>

<form id="customerForm">

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" id="fullname" placeholder="Enter your full name" required>
</div>

<div class="mb-3">
<label class="form-label">Mobile Number</label>
<input type="tel" class="form-control" id="mobilenumber" placeholder="Enter your mobile number" required>
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" id="email" placeholder="Enter your email" required>
</div>

<div class="mb-4">
<label class="form-label">Delivery Address</label>
<textarea class="form-control" id="address" rows="3" placeholder="Enter delivery address" required></textarea>
</div>

<div class="d-grid">
<button class="btn btn-gold btn-lg" type="submit">
<i class="bi bi-check-circle-fill"></i> Continue
</button>
</div>

</form>

</div>
</div>

</div>

<div class="modal fade" id="infoModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Confirm Your Details</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body" id="popupContent"></div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const modal=new bootstrap.Modal(document.getElementById('infoModal'));

document.getElementById('customerForm').addEventListener('submit',function(e){
e.preventDefault();

const html=`
<p><strong>👤 Name:</strong> ${fullname.value}</p>
<p><strong>📞 Mobile:</strong> ${mobilenumber.value}</p>
<p><strong>📧 Email:</strong> ${email.value}</p>
<p><strong>📍 Address:</strong> ${address.value}</p>`;

popupContent.innerHTML=html;
modal.show();
});
</script>

</body>
</html>
