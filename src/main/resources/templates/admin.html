<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sudhas Bakery Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins,sans-serif;background:#fff8f0}
.navbar{background:#fff!important;box-shadow:0 4px 15px rgba(0,0,0,.08)}
.hero{background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),url('/images/image4.jpg') center/cover;height:280px;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center}
.dashboard-card{border:none;border-radius:18px;box-shadow:0 8px 20px rgba(0,0,0,.08);transition:.3s}
.dashboard-card:hover{transform:translateY(-8px)}
.icon{font-size:48px;color:#d4af37}
.btn-gold{background:#d4af37;color:#fff}
.btn-gold:hover{background:#b38d17;color:#fff}
footer{background:#1f1f1f;color:#fff}
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top">
<div class="container">
<a class="navbar-brand fw-bold text-warning" th:href="@{/}">
<img th:src="@{/images/logo.png}" src="../static/images/logo.png" width="60"> Sudhas Bakery Admin
</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" th:href="@{/admin}"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
</ul>
</div>
</div>
</nav>

<section class="hero">
<div>
<h1 class="display-5 fw-bold">Welcome Admin</h1>
<p>Manage your bakery with ease.</p>
</div>
</section>

<div class="container py-5">
<div class="row g-4">
<div class="col-md-6">
<div class="card dashboard-card h-100">
<div class="card-body text-center p-5">
<div class="icon"><i class="bi bi-grid-fill"></i></div>
<h3 class="mt-3">Categories</h3>
<p>Create, edit and organize bakery categories.</p>
<a th:href="@{/admin/categories}" class="btn btn-gold px-4">Manage Categories</a>
</div>
</div>
</div>

<div class="col-md-6">
<div class="card dashboard-card h-100">
<div class="card-body text-center p-5">
<div class="icon"><i class="bi bi-box-seam-fill"></i></div>
<h3 class="mt-3">Products</h3>
<p>Add, update and manage bakery products.</p>
<a th:href="@{/admin/products}" class="btn btn-gold px-4">Manage Products</a>
</div>
</div>
</div>
</div>
</div>

<footer class="py-4 text-center">
<div class="container">
<h5>Sudhas Bakery Admin Panel</h5>
<p class="mb-0">Made with Love</p>
</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
