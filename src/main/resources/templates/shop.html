<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity3">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sudhas Bakery | Shop</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins,sans-serif;background:#fff8f0}
.navbar{background:#fff!important;box-shadow:0 5px 18px rgba(0,0,0,.08)}
.hero{background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),url('images/image3.jpg') center/cover;height:300px;display:flex;align-items:center;color:#fff}
.hero h1{font-weight:700}
.sidebar{background:#fff;border-radius:16px;padding:20px;box-shadow:0 8px 20px rgba(0,0,0,.08);position:sticky;top:90px}
.sidebar .list-group-item{border:none;border-radius:10px;margin:6px 0;transition:.3s}
.sidebar .list-group-item:hover{background:#d4af37;color:#fff}
.product-card{border:none;border-radius:18px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.08);transition:.35s}
.product-card:hover{transform:translateY(-10px)}
.product-card img{height:220px;object-fit:cover}
.price{color:#c79b06;font-size:1.4rem;font-weight:700}
.btn-gold{background:#d4af37;color:#fff}
.btn-gold:hover{background:#b58d17;color:#fff}
.badge-fresh{background:#fff3cd;color:#8a6500}
footer{background:#1f1f1f;color:#fff}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
<div class="container">
<a class="navbar-brand fw-bold text-warning" th:href="@{/}">
<img th:src="@{/images/logo.png}" src="../static/images/logo.png" width="60"> Sudhas Bakery
</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" th:href="@{/}">Home</a></li>
<li class="nav-item"><a class="nav-link active" th:href="@{/shop}">Shop</a></li>
<li class="nav-item"><a class="nav-link" sec:authorize="isAnonymous()" th:href="@{/admin}">Admin</a></li>
</ul>
</div>
</div>
</nav>

<section class="hero">
<div class="container text-center">
<h1 class="display-4">Discover Fresh Bakery Delights</h1>
<p>Handcrafted cakes, pizzas, pastries and more.</p>
</div>
</section>

<div class="container py-5">
<div class="row g-4">

<div class="col-lg-3">
<div class="sidebar">
<h4 class="mb-3 text-warning"><i class="bi bi-grid"></i> Categories</h4>
<div class="list-group">
<a th:each="category : ${categories}" class="list-group-item list-group-item-action"
th:href="@{/shop/category/{id}(id=${category.id})}" th:text="${category.name}"></a>
</div>
</div>
</div>

<div class="col-lg-9">
<div class="row g-4">

<div class="col-md-6 col-xl-4" th:each="product : ${products}">
<div class="card product-card h-100">
<img class="card-img-top" th:src="@{${'/productImages/' + product.imageName}}" th:alt="${product.name}">
<div class="card-body d-flex flex-column">
<span class="badge badge-fresh mb-2">Fresh Today</span>
<h5 class="fw-bold" th:text="${product.name}"></h5>
<p class="text-muted small flex-grow-1" th:text="${product.description}"></p>
<div class="price">₹ <span th:text="${product.price}"></span></div>
<a class="btn btn-gold mt-3 w-100" th:href="@{/shop/viewproduct/{id}(id=${product.id})}">
<i class="bi bi-eye-fill"></i> View Product
</a>
</div>
</div>
</div>

</div>
</div>

</div>
</div>

<footer class="py-4">
<div class="container text-center">
<h4>Sudhas Bakery</h4>
<p>Freshly Baked Happiness Every Day</p>
<p class="mb-0">Made with ❤️ using Fresh products</p>
</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
