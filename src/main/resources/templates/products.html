<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sudhas Bakery | Products</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins,sans-serif;background:#fff8f0}
.navbar{background:#fff!important;box-shadow:0 4px 15px rgba(0,0,0,.08)}
.header{background:linear-gradient(135deg,#d4af37,#f4e2a0);padding:35px;border-radius:18px;color:#5a4200}
.table-card{background:#fff;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,.08);overflow:hidden}
.table img{width:80px;height:80px;object-fit:cover;border-radius:10px}
.btn-gold{background:#d4af37;color:#fff}.btn-gold:hover{background:#b58d17;color:#fff}
.table tbody tr:hover{background:#fff9e8}
footer{background:#1f1f1f;color:#fff}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
<div class="container">
<a class="navbar-brand fw-bold text-warning" th:href="@{/admin}">
<img th:src="@{/images/logo.png}" src="../static/images/logo.png" width="60"> Sudhas Bakery Admin
</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" th:href="@{/admin}">Dashboard</a></li>
<li class="nav-item"><a class="nav-link" th:href="@{/admin}"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
</ul>
</div>
</div>
</nav>

<div class="container py-5">
<div class="header d-flex flex-column flex-md-row justify-content-between align-items-center mb-4">
<div>
<h2 class="fw-bold mb-1">Manage Products</h2>
<p class="mb-0">View, update and delete bakery products.</p>
</div>
<a th:href="@{/admin/products/add}" class="btn btn-dark mt-3 mt-md-0">
<i class="bi bi-plus-circle"></i> Add Product
</a>
</div>

<div class="table-card p-3">
<div class="table-responsive">
<table class="table align-middle">
<thead class="table-warning">
<tr>
<th>SN</th>
<th>Product</th>
<th>Category</th>
<th>Image</th>
<th>Delete</th>
<th>Update</th>
</tr>
</thead>
<tbody>
<tr th:each="product,iStat:${products}">
<td th:text="${iStat.index+1}"></td>
<td class="fw-semibold" th:text="${product.name}"></td>
<td th:text="${product.category.name}"></td>
<td><img th:src="@{${'/productImages/' + product.imageName}}" alt=""></td>
<td><a th:href="@{/admin/product/delete/{id}(id=${product.id})}" class="btn btn-danger btn-sm"><i class="bi bi-trash"></i> Delete</a></td>
<td><a th:href="@{/admin/product/update/{id}(id=${product.id})}" class="btn btn-primary btn-sm"><i class="bi bi-pencil-square"></i> Update</a></td>
</tr>
</tbody>
</table>
</div>
</div>
</div>

<footer class="py-3 text-center">
<div class="container">Sudhas Bakery Admin Panel</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
